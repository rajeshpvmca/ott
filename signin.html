<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly - Sign In</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-warper px-3">
    <!-- Animated Background -->
    <div class="bg-animation"></div>

    <!-- Back to Home -->
    <!-- <a href="index.html" class="back-home">
        <i class="bi bi-arrow-left"></i> Back to Home
    </a> -->

    <div class="signin-container p-lg-5 p-3" data-aos="zoom-in" data-aos-duration="1000">
        <h2>Sign In to Stackly</h2>
        <form id="loginForm">
            <div class="mb-3" data-aos="fade-up" data-aos-delay="200">
                <select class="form-control form-select" style="background-color: #1a1a24; color: white;" id="loginRole" required >
                    <option value="" disabled selected>Select Your Role</option>
                    <option value="User">User</option>
                    <option value="Admin">Admin</option>
                    <option value="Creator">Creator</option>
                </select>
            </div>
            <div class="mb-3" data-aos="fade-up" data-aos-delay="200">
                <input type="email" class="form-control" id="loginEmail" placeholder="Email Address" required>
            </div>
            <div class="mb-4 position-relative" data-aos="fade-up" data-aos-delay="300">
                <div class="input-group">
                    <input type="password" class="form-control" id="loginPass" placeholder="Password" required>
                    <button class="btn btn-outline-secondary toggle-password" type="button" style="border-radius: 0 10px 10px 0; border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.6);">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>
            <!-- <div class="d-flex justify-content-between align-items-center mb-4" data-aos="fade-up" data-aos-delay="350">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                    <label class="form-check-label small" for="rememberMe">
                        Remember me
                    </label>
                </div>
                <a href="404.html" class="text-danger small text-decoration-none fw-bold">Forgot Password?</a>
            </div> -->

             <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label" for="rememberMe">Remember Me</label>
                        </div>
                        <a href="404.html" class="text-danger text-decoration-none small fw-bold">Forgot Password?</a>
                    </div>


            <button type="submit" class="btn-signin" data-aos="fade-up" data-aos-delay="400">Sign In</button>
            <p class="text-center mt-3" data-aos="fade-up" data-aos-delay="500">
                Don't have an account? <a href="signup.html" class="text-danger text-decoration-none fw-bold">Sign Up</a>
            </p>
        </form>
    </div></div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- AOS Animation -->
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

    <script>
        AOS.init({
            duration:1200,
            once:true
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
