<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Plans - Stackly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .pricing-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            transition: 0.3s;
            backdrop-filter: blur(10px);
        }
        .pricing-card.featured {
            border-color: #ff003c;
            background: rgba(255, 0, 60, 0.05);
            transform: scale(1.05);
        }
        .pricing-card:hover { transform: translateY(-10px); }
    </style>
</head>
<body>
    <!-- Preloader -->
    <div id="preloader">
        <div class="loader-container">
            <div class="loader-ring"></div>
            <img src="assets/images/logoStackly.webp" alt="Loading..." class="loader-logo-pulse">
        </div>
    </div>

    <div id="header-placeholder"></div>
    <section class="pt-5 mt-5">
        <div class="container py-5 text-center">
            <h1 class="display-4 fw-bold" data-aos="fade-down">Choose Your Plan</h1>
            <p class="text-secondary mb-5" data-aos="fade-up">Cancel anytime. No hidden fees.</p>
            <div class="row g-4 align-items-center">
                <div class="col-lg-4" data-aos="fade-right">
                    <div class="pricing-card p-5">
                        <h4>Mobile</h4>
                        <h2 class="fw-bold my-4">₹149<small class="fs-6 text-muted">/mo</small></h2>
                        <ul class="list-unstyled text-secondary mb-4">
                            <li><i class="bi bi-check2 text-danger"></i> 480p Resolution</li>
                            <li><i class="bi bi-check2 text-danger"></i> Mobile & Tablet only</li>
                            <li><i class="bi bi-check2 text-danger"></i> 1 Screen</li>
                        </ul>
                        <button class="btn btn-outline-light rounded-pill w-100 py-2" onclick="location.href='signin.html'">Get Started</button>
                    </div>
                </div>
                <div class="col-lg-4" data-aos="zoom-in">
                    <div class="pricing-card featured p-5">
                        <span class="badge bg-danger mb-3">MOST POPULAR</span>
                        <h4>Standard</h4>
                        <h2 class="fw-bold my-4">₹499<small class="fs-6 text-muted">/mo</small></h2>
                        <ul class="list-unstyled text-secondary mb-4">
                            <li><i class="bi bi-check2 text-danger"></i> 1080p Full HD</li>
                            <li><i class="bi bi-check2 text-danger"></i> TV, Laptop, Mobile</li>
                            <li><i class="bi bi-check2 text-danger"></i> 2 Screens</li>
                        </ul>
                        <button class="btn btn-danger rounded-pill w-100 py-2" onclick="location.href='signin.html'">Get Premium</button>
                    </div>
                </div>
                <div class="col-lg-4" data-aos="fade-left">
                    <div class="pricing-card p-5">
                        <h4>Premium</h4>
                        <h2 class="fw-bold my-4">₹799<small class="fs-6 text-muted">/mo</small></h2>
                        <ul class="list-unstyled text-secondary mb-4">
                            <li><i class="bi bi-check2 text-danger"></i> 4K + HDR</li>
                            <li><i class="bi bi-check2 text-danger"></i> Dolby Atmos Sound</li>
                            <li><i class="bi bi-check2 text-danger"></i> 4 Screens</li>
                        </ul>
                        <button class="btn btn-outline-light rounded-pill w-100 py-2" onclick="location.href='signin.html'">Go Pro</button>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <div id="footer-placeholder"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
