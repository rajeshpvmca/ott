<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Stackly</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Preloader -->
    <div id="preloader">
        <div class="loader-container">
            <div class="loader-ring"></div>
            <img src="assets/images/logoStackly.webp" alt="Loading..." class="loader-logo-pulse">
        </div>
    </div>
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>
    
    <!-- Contact Hero Section -->
    <section class="contact-hero pt-5 mt-5">
        <div class="container pt-5">
            <div class="col-lg-8 mx-auto text-center" data-aos="fade-up">
                <h1 class="display-4 fw-bold text-white">Get in Touch with Stackly</h1>
                <p class="lead text-secondary mt-3">
                    Have questions, feedback, or need support? We're here to help!
                </p>
            </div>
        </div>
    </section>

    <!-- Contact Form & Info Section -->
    <section class="py-3">
        <div class="container">
            <div class="row g-5">
                <div class="col-lg-6" data-aos="fade-right">
                    <h3 class="mb-4">Send Us a Message</h3>
                    <form action="404.html" class="contact-form px-4 rounded-3">
                        <div class="mb-3">
                            <input type="text" class="form-control" placeholder="Your Name" required>
                        </div>
                        <div class="mb-3">
                            <input type="email" class="form-control" placeholder="Your Email" required>
                        </div>
                        <div class="mb-3">
                            <input type="text" class="form-control" placeholder="Subject" required>
                        </div>
                        <div class="mb-3">
                            <textarea class="form-control" rows="5" placeholder="Your Message" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-danger rounded-pill px-4 py-2">Send Message</button>
                    </form>
                </div>
                <div class="col-lg-6" data-aos="fade-left">
                    <h3 class="mb-4">Contact Information</h3>
                    <div class="contact-info px-4 rounded-3">
                        <p class="lead text-white mb-4">We'd love to hear from you!</p>
                        <ul class="list-unstyled text-secondary">
                            <li class="mb-3"><i class="bi bi-geo-alt-fill me-3 text-danger"></i> 123 Stackly Street, Chennai, India</li>
                            <li class="mb-3"><i class="bi bi-envelope-fill me-3 text-danger"></i> support@stackly.com</li>
                            <li class="mb-3"><i class="bi bi-telephone-fill me-3 text-danger"></i> +91 98765 43210</li>
                            <li class="mb-3"><i class="bi bi-clock-fill me-3 text-danger"></i> Mon - Fri: 9:00 AM - 6:00 PM IST</li>
                        </ul>
                    </div>
                   

                </div>
            </div>

             <div class="mt-4" data-aos="fade-up" data-aos-delay="100">
                        <h3 class="mb-3">Find Us on Map</h3>
                        <div class="map-container">

    <iframe
        src="https://maps.google.com/maps?q=chennai&t=&z=13&ie=UTF8&iwloc=&output=embed"
        allowfullscreen=""
        loading="lazy">
    </iframe>
                    </div>


</div>

        </div>
    </section>
    
    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- AOS Animation -->
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
   <script>
        // Function to load components
        async function loadComponents() {
            // Load Header
            const headerRes = await fetch('header.html');
            document.getElementById('header-placeholder').innerHTML = await headerRes.text();
            
            // Load Footer
            const footerRes = await fetch('footer.html');
            document.getElementById('footer-placeholder').innerHTML = await footerRes.text();

            // Initialize AOS after components load
            AOS.init({
                duration: 1200,
                once: true
            });

            // Hide Preloader
            const preloader = document.getElementById('preloader');
            setTimeout(() => {
                if(preloader) preloader.classList.add('preloader-hidden');
            }, 2000); // 2.0 second delay
        }

        loadComponents();
    </script>
</body>
</html>
