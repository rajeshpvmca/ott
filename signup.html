<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly - Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <style>
        body { background:#0b0b0f; color:white; min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:'Poppins', sans-serif; }
        .signup-container { background:rgba(255,255,255,0.05); backdrop-filter:blur(20px); padding:40px; border-radius:20px; border:1px solid rgba(255,255,255,0.1); width:100%; max-width:500px; }
        .form-control { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; padding:12px; }
        .form-control:focus { background:rgba(255,255,255,0.15); color:white; border-color:#ff003c; }
        .btn-signup { background:#ff003c; color:white; width:100%; padding:12px; border:none; border-radius:10px; font-weight:600; }
    </style>
</head>
<body>
    <div class="signup-container" data-aos="zoom-in">
        <h2 class="text-center mb-4" style="color:#ff003c; font-weight:700;">Join Stackly</h2>
        <form id="signupForm">
            <div class="mb-3"><input type="text" id="regName" class="form-control" placeholder="Full Name" required></div>
            <div class="mb-3">
                <select id="regRole" class="form-control form-select" required style="background-color: #1a1a24; color: white;">
                    <option value="" disabled selected>Choose Role</option>
                    <option value="User">User</option>
                    <option value="Admin">Admin</option>
                    <option value="Creator">Creator</option>
                </select>
            </div>
            <div class="mb-3"><input type="email" id="regEmail" class="form-control" placeholder="Email Address" required></div>
            <div class="mb-3">
                <div class="input-group">
                    <input type="password" id="regPass" class="form-control" placeholder="Password" required>
                    <button class="btn btn-outline-secondary toggle-password" type="button" style="border-color: rgba(255,255,255,0.2);"><i class="fa-solid fa-eye"></i></button>
                </div>
            </div>
            <div class="mb-3">
                <div class="input-group">
                    <input type="password" id="regConfirmPass" class="form-control" placeholder="Confirm Password" required>
                    <button class="btn btn-outline-secondary toggle-password" type="button" style="border-color: rgba(255,255,255,0.2);"><i class="fa-solid fa-eye"></i></button>
                </div>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="terms" required>
                <label class="form-check-label small" for="terms">I agree to the Terms & Conditions</label>
            </div>
            <button type="submit" class="btn-signup">Create Account</button>
            <p class="text-center mt-3 small">Already have an account? <a href="signin.html" class="text-danger fw-bold">Login</a></p>
        </form>
    </div>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>
    <script src="script.js"></script>
</body>
</html>
