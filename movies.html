<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies - Stackly</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
        
    <link rel="stylesheet" href="style.css">
    <style>
        .movie-hero {
            height: 80vh;
            background: linear-gradient(to right, rgba(0,0,0,0.9) 20%, rgba(0,0,0,0.2)), 
                        url('/assets/images/moviesbanner.webp');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            padding-top: 80px;
        }

        .category-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-left: 10px;
            border-left: 4px solid #ff003c;
        }

        .movie-row {
            margin-bottom: 40px;
        }

        /* Enhanced Card for Movies Page */
        .movie-card-premium {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            transition: 0.5s ease;
            cursor: pointer;
        }

        .movie-card-premium img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .movie-card-premium:hover {
            transform: scale(1.1);
            z-index: 10;
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.5);
        }

        .badge-new {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff003c;
            padding: 2px 10px;
            font-size: 12px;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Preloader -->
    <div id="preloader">
        <div class="loader-container">
            <div class="loader-ring"></div>
            <img src="assets/images/logoStackly.webp" alt="Loading..." class="loader-logo-pulse">
        </div>
    </div>
    
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>
    
    <!-- Featured Movie Spotlight -->
    <section class="movie-hero">
        <div class="container">
            <div class="col-lg-6" data-aos="fade-right">
                <span class="badge bg-danger mb-3">Featured Premiere</span>
                <h1 class="display-3 fw-bold">INTERSTELLAR</h1>
                <p class="lead my-4 text-light">
                    When Mankind's time on Earth is coming to an end, a team of researchers undertakes the most important mission in human history.
                </p>
                <div class="d-flex gap-3">
                    <button class="btn btn-danger rounded-pill px-3"><i class="bi bi-play-fill"></i> Play Now</button>
                    <button class="btn btn-outline-light rounded-pill px-3"><i class="bi bi-info-circle"></i> More</button>
                </div>
            </div>
        </div>
    </section>    
    
    <!-- Movie Browsing Section -->
    <div class="container mt-5">
        
        <!-- Trending Now -->
        <div class="movie-row" data-aos="fade-up">
            <h3 class="category-title">Trending Now</h3>
            <div class="row g-3">
                <div class="col-6 col-md-4 col-lg-2">
                    <div class="movie-card-premium">
                        <img src="assets/images/movie1.webp" alt="movie">
                        <span class="badge-new">New</span>
                    </div>
                </div>
                <!-- Add more movie items here -->
                <div class="col-6 col-md-4 col-lg-2"><div class="movie-card-premium"><img src="assets/images/movie2.webp" alt="movie"></div></div>
                <div class="col-6 col-md-4 col-lg-2"><div class="movie-card-premium"><img src="assets/images/movie3.webp" alt="movie"></div></div>
                <div class="col-6 col-md-4 col-lg-2"><div class="movie-card-premium"><img src="assets/images/movie4.webp" alt="movie"></div></div>
                <div class="col-6 col-md-4 col-lg-2"><div class="movie-card-premium"><img src="assets/images/movie5.webp" alt="movie"></div></div>
                <div class="col-6 col-md-4 col-lg-2"><div class="movie-card-premium"><img src="assets/images/movie6.webp" alt="movie"></div></div>
            </div>
        </div>

        <!-- Popular on Stackly -->
        <div class="movie-row" data-aos="fade-up">
            <h3 class="category-title">Popular on Stackly</h3>
            <div class="row g-3">
                <div class="col-6 col-md-4 col-lg-2"><div class="movie-card-premium"><img src="assets/images/movie4.webp" alt="movie"></div></div>
                <div class="col-6 col-md-4 col-lg-2"><div class="movie-card-premium"><img src="assets/images/popular2.webp" alt="movie"></div></div>
                <div class="col-6 col-md-4 col-lg-2"><div class="movie-card-premium"><img src="assets/images/popular3.webp" alt="movie"></div></div>
                <div class="col-6 col-md-4 col-lg-2"><div class="movie-card-premium"><img src="assets/images/popular4.webp" alt="movie"></div></div>
                <div class="col-6 col-md-4 col-lg-2"><div class="movie-card-premium"><img src="assets/images/movie6.webp" alt="movie"></div></div>
                <div class="col-6 col-md-4 col-lg-2"><div class="movie-card-premium"><img src="assets/images/popular6.webp" alt="movie"></div></div>
            </div>
        </div>

    </div>
    
    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

    <script>
        // Function to load components
        async function loadComponents() {
            // Load Header
            const headerRes = await fetch('header.html');
            document.getElementById('header-placeholder').innerHTML = await headerRes.text();
            
            // Load Footer
            const footerRes = await fetch('footer.html');
            document.getElementById('footer-placeholder').innerHTML = await footerRes.text();

            // Initialize AOS after components load
            AOS.init({
                duration: 1200,
                once: true
            });

            // Hide Preloader
            const preloader = document.getElementById('preloader');
            setTimeout(() => {
                if(preloader) preloader.classList.add('preloader-hidden');
            }, 2000); // 2.0 second delay
        }

        loadComponents();
    </script>
</body>
</html>
