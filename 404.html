<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found | Stackly</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <style>
        body {
            background: radial-gradient(circle at center, #1a0a0e 0%, #0b0b0f 100%);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        .error-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            padding: 60px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 150px;
            color: #ff003c;
            font-weight: 800;
            margin: 0;
            line-height: 1;
            text-shadow: 0 0 30px rgba(255, 0, 60, 0.3);
            animation: float 4s ease-in-out infinite;
        }

        h2 {
            font-weight: 600;
            margin-top: 20px;
        }

        .btn-group-gap {
            gap: 15px;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        @media (max-width: 576px) {
            h1 {
                font-size: 100px;
            }

            .error-container {
                padding: 40px 20px;
                width: 90%;
            }

            .btn-group-gap {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="container d-flex justify-content-center">
        <div class="error-container" data-aos="zoom-in" data-aos-duration="1000">
            <h1 data-aos="fade-down" data-aos-delay="200">404</h1>
            <h2 data-aos="fade-up" data-aos-delay="400">Oops! Feature Under Construction</h2>
            <p class="text-secondary mb-4" data-aos="fade-up" data-aos-delay="600">
                The page you are looking for is currently being built by our team.
            </p>

            <div class="d-flex justify-content-center btn-group-gap" data-aos="fade-up" data-aos-delay="800">
                <a href="index.html" class="btn btn-outline-light rounded-pill px-4 py-2">
                    <i class="bi bi-house-door me-2"></i> Back to Home
                </a>
                <button onclick="history.back()" class="btn btn-danger rounded-pill px-4 py-2">
                    <i class="bi bi-arrow-left me-2"></i> Go Back
                    </a>
            </div>
        </div>
    </div>

    <!-- AOS Animation Script -->
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init({ once: true });
    </script>
</body>

</html>
